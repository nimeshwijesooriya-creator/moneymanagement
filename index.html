<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WageTracker Wealth Manager</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#047857">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

  <!-- Header -->
  <header class="bg-emerald-700 text-white p-4 text-center sticky top-0 z-10 shadow-md">
    <h1 class="text-xl font-bold" id="header-title">WageTracker</h1>
  </header>

  <main class="p-4 max-w-lg mx-auto" id="app-content">
    <div id="loading" class="text-center py-10 font-semibold text-emerald-700">Syncing database...</div>

    <!-- WEALTH TAB -->
    <div id="view-wealth" class="hidden">
      <!-- NEW: Total Net Worth Box -->
      <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl mb-6 text-center shadow-sm">
        <h3 class="text-xs font-bold uppercase tracking-wide text-gray-500">Total Net Worth</h3>
        <div id="wealth-total" class="text-3xl font-bold text-blue-700 mt-1">0.00</div>
      </div>

      <div id="accounts-container" class="space-y-4 mb-8"></div>

      <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-bold mb-4 text-emerald-800">Create New Account</h2>
        <form id="form-account" class="space-y-3">
          <div><label class="block text-sm text-gray-600">Account Name</label><input type="text" id="acc-name" class="w-full border p-2 rounded bg-gray-50" required></div>
          <div><label class="block text-sm text-gray-600">Type</label>
            <select id="acc-type" class="w-full border p-2 rounded bg-gray-50">
              <option value="Checking / Everyday">Checking / Everyday</option>
              <option value="Savings">Savings</option>
              <option value="Monthly Fixed Payment">Monthly Fixed Payment</option>
            </select>
          </div>
          <div><label class="block text-sm text-gray-600">Starting Balance</label><input type="number" id="acc-balance" class="w-full border p-2 rounded bg-gray-50" step="0.01" required></div>
          <button type="submit" class="w-full bg-emerald-600 text-white font-bold p-3 rounded-lg shadow mt-2">Add Account</button>
        </form>
      </div>
    </div>

    <!-- PLANNER TAB -->
    <div id="view-planner" class="hidden">
      <input type="month" id="planner-month" class="w-full p-3 mb-4 rounded-xl border border-gray-300 shadow-sm text-lg font-bold text-center text-emerald-800">
      
      <!-- NEW: Allocated vs Safe to Assign Box -->
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 flex justify-between items-center text-center shadow-sm">
        <div class="w-1/2 border-r border-blue-200">
            <h3 class="text-xs font-bold uppercase tracking-wide text-gray-500">Allocated Cash</h3>
            <div id="planner-allocated" class="text-xl font-bold text-gray-700 mt-1">0.00</div>
        </div>
        <div class="w-1/2">
            <h3 class="text-xs font-bold uppercase tracking-wide text-blue-800">Safe to Assign</h3>
            <div id="planner-unallocated" class="text-2xl font-bold text-blue-700 mt-1">0.00</div>
        </div>
      </div>

      <h2 class="text-lg font-bold mb-3 text-gray-700">Envelopes</h2>
      <div id="envelopes-container" class="space-y-3 mb-8"></div>

      <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-bold mb-4 text-emerald-800">Create New Envelope</h2>
        <form id="form-envelope" class="space-y-3">
          <div><label class="block text-sm text-gray-600">Account</label><select id="env-account" class="w-full border p-2 rounded bg-gray-50" required></select></div>
          <div><label class="block text-sm text-gray-600">Category Name</label><input type="text" id="env-category" class="w-full border p-2 rounded bg-gray-50" required></div>
          <div><label class="block text-sm text-gray-600">Amount</label><input type="number" id="env-amount" class="w-full border p-2 rounded bg-gray-50" step="0.01" required></div>
          <button type="submit" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg shadow mt-2">Save Envelope</button>
        </form>
      </div>
    </div>

    <!-- TRANSACTIONS TAB -->
    <div id="view-transactions" class="hidden">
      <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6">
        <h2 class="text-lg font-bold mb-4 text-emerald-800">Record Transaction</h2>
        <div class="flex border rounded-lg overflow-hidden mb-4 bg-gray-50">
          <button id="tab-expense" class="flex-1 py-2 font-bold text-red-600 bg-red-100 tx-tab">Expense</button>
          <button id="tab-income" class="flex-1 py-2 font-bold text-gray-500 tx-tab">Income</button>
          <button id="tab-transfer" class="flex-1 py-2 font-bold text-gray-500 tx-tab">Transfer</button>
        </div>
        
        <form id="form-transaction" class="space-y-3">
          <div><label class="block text-sm text-gray-600">From Account</label><select id="tx-account" class="w-full border p-2 rounded bg-gray-50" required></select></div>
          <div id="wrap-to-account" class="hidden"><label class="block text-sm text-gray-600">To Account</label><select id="tx-to-account" class="w-full border p-2 rounded bg-gray-50"></select></div>
          <div id="wrap-envelope"><label class="block text-sm text-gray-600">Envelope Category</label><select id="tx-category" class="w-full border p-2 rounded bg-gray-50"></select></div>
          <div><label class="block text-sm text-gray-600">Amount</label><input type="number" id="tx-amount" class="w-full border p-2 rounded bg-gray-50" step="0.01" required></div>
          <div><label class="block text-sm text-gray-600">Note</label><input type="text" id="tx-note" class="w-full border p-2 rounded bg-gray-50"></div>
          <button type="submit" class="w-full bg-emerald-600 text-white font-bold p-3 rounded-lg shadow mt-2">Save Transaction</button>
        </form>
      </div>
      <h2 class="text-lg font-bold mb-3 text-gray-700">Recent History</h2>
      <div id="history-container" class="space-y-2"></div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-xs font-bold text-gray-500 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button id="nav-wealth" class="flex flex-col items-center text-emerald-700"><span class="text-xl mb-1">🏦</span>Wealth</button>
    <button id="nav-planner" class="flex flex-col items-center"><span class="text-xl mb-1">🎯</span>Planner</button>
    <button id="nav-transactions" class="flex flex-col items-center"><span class="text-xl mb-1">💸</span>Transact</button>
  </nav>

  <script src="./app.js"></script>
</body>
</html>
