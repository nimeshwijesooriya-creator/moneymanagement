<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WageTracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-24">

  <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
    <h1 class="text-xl font-bold">WageTracker</h1>
    <button id="refreshBtn" class="text-sm bg-emerald-700 px-3 py-1 rounded hover:bg-emerald-800">↻ Sync</button>
  </header>

  <main class="p-4 max-w-md mx-auto">
    <div id="loading" class="hidden text-center py-2 text-emerald-600 font-semibold text-sm">Syncing Data...</div>

    <!-- TRACKER TAB -->
    <div id="trackerTab" class="space-y-6">
      <section>
        <h2 class="text-lg font-semibold mb-3 text-gray-700">Account Balances</h2>
        <div id="balancesGrid" class="grid grid-cols-2 gap-3"></div>
      </section>

      <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">Add Entry</h2>
        <form id="txForm" class="space-y-4">
          <div class="flex gap-2">
            <label class="flex-1 block"><input type="radio" name="type" value="Income" class="peer hidden" checked><div class="text-center py-2 border rounded-lg peer-checked:bg-emerald-100 peer-checked:border-emerald-500 font-medium cursor-pointer">Income</div></label>
            <label class="flex-1 block"><input type="radio" name="type" value="Expense" class="peer hidden"><div class="text-center py-2 border rounded-lg peer-checked:bg-red-100 peer-checked:border-red-500 font-medium cursor-pointer">Expense</div></label>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Account</label>
            <select id="accountSelect" class="w-full border rounded-lg p-2 bg-gray-50" required></select>
          </div>
          <!-- New Category Dropdown (Hides automatically if no budgets exist) -->
          <div id="categoryContainer" class="hidden">
            <label class="block text-sm text-gray-600 mb-1">Budget Category</label>
            <select id="txCategorySelect" class="w-full border rounded-lg p-2 bg-gray-50"></select>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Amount</label>
            <input type="number" id="amountInput" step="0.01" class="w-full border rounded-lg p-2 bg-gray-50" required>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Note (Optional)</label>
            <input type="text" id="noteInput" class="w-full border rounded-lg p-2 bg-gray-50">
          </div>
          <button type="submit" class="w-full bg-emerald-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-emerald-700 transition">Save Transaction</button>
        </form>
      </section>
    </div>

    <!-- PLANNER TAB (NEW) -->
    <div id="plannerTab" class="hidden space-y-6">
      <section>
        <h2 class="text-lg font-semibold mb-3 text-gray-700">Budget Progress</h2>
        <div id="budgetProgressContainer" class="space-y-4"></div>
      </section>

      <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">Add Planned Expense</h2>
        <form id="budgetForm" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-600 mb-1">Parent Account</label>
            <select id="budgetAccountSelect" class="w-full border rounded-lg p-2 bg-gray-50" required></select>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Bill/Category (e.g., Rent, Mobile)</label>
            <input type="text" id="budgetCatInput" class="w-full border rounded-lg p-2 bg-gray-50" required>
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Planned Amount</label>
            <input type="number" id="budgetAmountInput" step="0.01" class="w-full border rounded-lg p-2 bg-gray-50" required>
          </div>
          <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-blue-700 transition">Save to Budget Plan</button>
        </form>
      </section>
    </div>

    <!-- ANALYTICS TAB -->
    <div id="analyticsTab" class="hidden space-y-6">
      <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-lg font-semibold text-gray-700 mb-1">Wages Ratio</h2>
        <div id="wagesRatioContainer" class="space-y-4 mt-3"></div>
      </section>
      <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
        <h2 class="text-lg font-semibold text-gray-700 mb-1">Spending Ratio</h2>
        <div id="spendingRatioContainer" class="space-y-4 mt-3"></div>
      </section>
    </div>
  </main>

  <!-- 3-Button Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg flex justify-around items-center h-16 z-20">
    <button id="navTracker" class="flex flex-col items-center justify-center w-full h-full text-emerald-600 font-semibold text-sm"><span>📝</span><span>Tracker</span></button>
    <button id="navPlanner" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-sm"><span>🎯</span><span>Planner</span></button>
    <button id="navAnalytics" class="flex flex-col items-center justify-center w-full h-full text-gray-400 font-semibold text-sm"><span>📊</span><span>Analytics</span></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
