<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WageTracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { overscroll-behavior-y: contain; }
    .loader { border-top-color: #10b981; animation: spinner 1s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-20">

  <header class="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
    <h1 class="text-xl font-bold">WageTracker</h1>
    <button id="refreshBtn" class="text-sm bg-emerald-700 px-3 py-1 rounded hover:bg-emerald-800">↻ Sync</button>
  </header>

  <main class="p-4 max-w-md mx-auto space-y-6">
    
    <div id="loading" class="hidden flex justify-center py-4">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8"></div>
    </div>

    <!-- Balances UI -->
    <section>
      <h2 class="text-lg font-semibold mb-3 text-gray-700">Account Balances</h2>
      <div id="balancesGrid" class="grid grid-cols-2 gap-3"></div>
    </section>

    <!-- Transaction Form -->
    <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
      <h2 class="text-lg font-semibold mb-4 text-gray-700">Add Entry</h2>
      <form id="txForm" class="space-y-4">
        
        <div class="flex gap-2">
          <label class="flex-1 block">
            <input type="radio" name="type" value="Income" class="peer hidden" checked>
            <div class="text-center py-2 border rounded-lg peer-checked:bg-emerald-100 peer-checked:border-emerald-500 peer-checked:text-emerald-700 font-medium cursor-pointer transition">Income</div>
          </label>
          <label class="flex-1 block">
            <input type="radio" name="type" value="Expense" class="peer hidden">
            <div class="text-center py-2 border rounded-lg peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 font-medium cursor-pointer transition">Expense</div>
          </label>
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1">Account</label>
          <select id="accountSelect" class="w-full border rounded-lg p-2 bg-gray-50 focus:ring-emerald-500" required></select>
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1">Amount</label>
          <input type="number" id="amountInput" step="0.01" inputmode="decimal" class="w-full border rounded-lg p-2 bg-gray-50" required>
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1">Note (Optional)</label>
          <input type="text" id="noteInput" class="w-full border rounded-lg p-2 bg-gray-50" placeholder="e.g. Groceries, Rent">
        </div>

        <button type="submit" class="w-full bg-emerald-600 text-white font-semibold py-3 rounded-lg shadow hover:bg-emerald-700 transition">Save Transaction</button>
      </form>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
